<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Navbar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/98d8ec6431.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="navbar">
        <div class="navbar-item nav-item" aria-label="Home"><i class="fa fa-home"></i></div>
        <div class="navbar-item nav-item" aria-label="User"><i class="fa fa-user"></i></div>
        <div class="navbar-item nav-item active" aria-label="Comment"><i class="fa fa-comment"></i></div>
        <div class="navbar-item nav-item" aria-label="Camera"><i class="fa fa-camera"></i></div>
        <div class="navbar-item nav-item" aria-label="Gear"><i class="fa fa-gear"></i></div>
        <div class="highlight"></div>
    </div>

    <!-- Click sound -->
    <audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

    <script src="script.js"></script>
</body>
</html>
